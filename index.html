<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <header>
            <nav>
                <ul class="nav-bar">
                    <li><a href="images.html">Image</a></li>
                    <li><a href="advanced.html">Advanced Search</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/1920px-Google_2015_logo.svg.png" alt="google-search-loge">
            <form action="https://google.com/search">
                <div class="search-bar">
                    <input type="text" name="q" placeholder="Search" autofocus>

                <div class="search-button">
                    <input type="submit" value="Google Search">
                    <input type="submit" name="btnI" value="I Feeling lucky">
                </div>
            </form>
        </main>
    </body>
</html>
