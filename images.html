<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Image Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <ul class="nav-bar">
        <li><a href="index.html">Google Search</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <div class="logo-area">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Google_Images_2015_logo.svg/1920px-Google_Images_2015_logo.svg.png" alt="Google Image Search">
    </div>
    <form action="https://www.google.com/search">
      <div class="search-bar">
       <input type="text" name="q" placeholder="Search Images">
       <input type="hidden" name="udm" value="2">
      </div>
      <div class="search-button">
        <input type="submit" value="Image Search">
      </div>
    </form>
  </main>
</body>
</html>
